name: Formatter

on: [pull_request]

jobs:
  formatting:
    runs-on: ubuntu-latest

    steps:
      - name: git checkout
        uses: actions/checkout@v4.1.1
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.WALL_BREW_BOT_PAT }}

      - name: Cache maven dependencies
        uses: actions/cache@v3
        env:
          cache-name: cache-maven
        with:
          path: ~/.m2
          key: ${{ runner.os }}-clj-${{ hashFiles('**/project.clj') }}
          restore-keys: |
            ${{ runner.os }}-clj

      - name: Install Clojure dependencies
        run: lein deps

      - name: Install cljstyle
        uses: just-sultanov/setup-cljstyle@v1
        with:
          version: '0.14.0'

      - name: Format Clojure code
        run: |
          cljstyle fix --report --report-timing --verbose

      - name: Sort Namespaces
        run: |
          lein ns-sort

      - name: Render Changelog
        run: |
          lein sealog render

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5.0.0
        with:
          commit_message: |
            [Format] Auto-formatting

